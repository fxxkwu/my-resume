<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wu 的個人網頁</title>
    <style>
        /* 基礎樣式 */
        body { font-family: "微軟正黑體", Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; color: #333; }
        .container { max-width: 900px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* 標題區域 */
        header { text-align: center; margin-bottom: 30px; }
        .device-indicator { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; margin-top: 10px; }

        /* 按鈕區域 */
        .tab-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
        button { 
            padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; 
            background-color: #eee; border-radius: 8px; transition: all 0.3s ease;
        }
        button.active { background-color: #2575fc; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 117, 252, 0.3); }

        /* 內容區塊 */
        .tab-content { display: none; padding: 20px; line-height: 1.8; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 判斷邏輯：桌面版 (> 768px) --- */
        @media screen and (min-width: 769px) {
            .container { border-left: 8px solid #2575fc; }
            h1 { font-size: 2.5em; color: #2575fc; }
            .device-indicator { background: #eef2ff; color: #2575fc; border: 1px solid #2575fc; }
            .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        }

        /* --- 判斷邏輯：手機版 (<= 768px) --- */
        @media screen and (max-width: 768px) {
            .container { margin: 10px; padding: 20px; border-top: 8px solid #ff4b2b; }
            h1 { font-size: 1.8em; color: #ff4b2b; }
            .tab-buttons { flex-direction: column; }
            button { width: 100%; }
            .device-indicator { background: #fff0f0; color: #ff4b2b; border: 1px solid #ff4b2b; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="main-title">載入中...</h1>
        <div id="device-tag" class="device-indicator">偵測裝置中...</div>
    </header>
    
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('intro', this)">👤 個人簡介</button>
        <button class="tab-btn" onclick="switchTab('interests', this)">🏀 興趣專長</button>
        <button class="tab-btn" onclick="switchTab('goals', this)">🚀 核心目標</button>
    </div>

    <div id="intro" class="tab-content active">
        <h2>關於我</h2>
        <p>你好，我是 <strong>Wu</strong>。</p>
        <p>我性格開朗，勇於挑戰，不懼怕任何事物。我對任何事情都有許多的好奇心，遇到任何問題都會想辦法解決。這份特質讓我能在不同領域間不斷探索與成長。</p>
    </div>

    <div id="interests" class="tab-content">
        <h2>興趣與專長</h2>
        <ul>
            <li><strong>打籃球：</strong> 喜歡在球場上與隊友流汗奮戰，訓練團隊合作。</li>
            <li><strong>健身：</strong> 追求身體極限，透過重量訓練磨練自律能力。</li>
        </ul>
    </div>

    <div id="goals" class="tab-content">
        <h2>未來願景</h2>
        <p>我不給自己設限，致力於跨領域的專業發展：</p>
        <div class="content-grid">
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">💪 <strong>專業健身教練</strong></div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">💻 <strong>軟體工程師</strong></div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">🔧 <strong>專業水電師傅</strong></div>
        </div>
    </div>
</div>

<script>
    // 1. 按鈕切換功能
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // 2. 裝置判斷功能
    function checkDevice() {
        const title = document.getElementById('main-title');
        const tag = document.getElementById('device-tag');
        
        if (window.innerWidth <= 768) {
            title.innerText = "Wu 的個人檔案 (手機版)";
            tag.innerText = "📱 當前偵測：行動裝置環境";
        } else {
            title.innerText = "Wu 的個人檔案 (桌電版)";
            tag.innerText = "💻 當前偵測：桌面電腦環境";
        }
    }

    // 監聽視窗變化並初始化
    window.addEventListener('resize', checkDevice);
    checkDevice();
</script>

</body>
</html>
